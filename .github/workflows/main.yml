name: Auto Commits

on:
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.MY_TOKEN }}
      - name: Make 100 commits
        run: |
          git config user.email "dhanstj1234@gmail.com"
          git config user.name "dhanstj"
          for i in $(seq 201 300); do
            echo "commit $i - $(date)" >> log.txt
            git add .
            git commit -m "update $i"
          done
          git push
